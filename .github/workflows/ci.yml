name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run mypy scripts/ tests/

  schema-valid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version
      - run: uv sync --extra dev
      - run: uv run linkml-validate --schema schema/crkg.yaml

  emission-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version
      - run: uv sync --extra dev
      - run: uv run python scripts/emit.py --check

  fixtures-valid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version
      - run: uv sync --extra dev
      - run: uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version
      - run: uv sync --extra dev
      - run: uv build
